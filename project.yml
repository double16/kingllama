name: KingLlama
options:
  bundleIdPrefix: com.kingllama
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0

targets:
  KingLlama:
    type: application
    platform: macOS
    sources:
      - path: GPUManager
        type: group
        includes:
          - "*.swift"
          - "Resources/**"
    settings:
      base:
        INFOPLIST_FILE: GPUManager/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kingllama.KingLlama
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
